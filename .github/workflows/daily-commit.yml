name: Daily Auto Commit

on:
  schedule:
    - cron: '30 14 * * *'   # Runs daily at 14:30 UTC (fixed time, no wildcards)
  workflow_dispatch:        # Allows manual run

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Make Daily Commit 23f3002303@ds.study.iitm.ac.in
        run: |
          echo "Last updated on $(date)" >> daily-log.txt
          git config --global user.name "Abdul Majid"
          git config --global user.email "23f3002303@ds.study.iitm.ac.in"
          git add daily-log.txt
          git commit -m "Daily automated commit"
          git push
