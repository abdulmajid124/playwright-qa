name: Daily Auto Commit

on:
  schedule:
    - cron: '30 14 * * *'   # runs daily at 14:30 UTC
  workflow_dispatch:

permissions:
  contents: write   # IMPORTANT: allows push

jobs:
  auto-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Make Daily Commit 23f3002303@ds.study.iitm.ac.in
        run: |
          echo "Last updated on $(date)" >> daily-log.txt
          git config --global user.name "Abdul Majid"
          git config --global user.email "23f3002303@ds.study.iitm.ac.in"
          git add daily-log.txt
          git commit -m "Daily automated commit" || echo "No changes to commit"
          git push
